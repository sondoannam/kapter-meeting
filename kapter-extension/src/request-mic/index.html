<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kapter Microphone Permission</title>
    <script type="module" src="./index.ts"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.28);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #cbd5e1;
      }

      #status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(30, 41, 59, 0.9);
        color: #f8fafc;
      }

      #status[data-tone="success"] {
        background: rgba(22, 101, 52, 0.85);
      }

      #status[data-tone="error"] {
        background: rgba(153, 27, 27, 0.88);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Grant microphone access to Kapter</h1>
      <p>
        Chrome can only show the microphone permission prompt from a normal
        extension page. Choose <strong>Allow</strong> when prompted. This tab
        closes automatically afterward.
      </p>
      <div id="status" data-tone="pending">Requesting microphone access...</div>
    </main>
  </body>
</html>
