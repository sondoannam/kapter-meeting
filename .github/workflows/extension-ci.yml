name: Extension CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: Lint, typecheck, and build extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @kapter/contracts build

      - name: Lint extension
        run: pnpm --filter ./kapter-extension lint

      - name: Typecheck extension
        run: pnpm --filter ./kapter-extension typecheck

      - name: Build extension
        run: pnpm --filter ./kapter-extension build

      - name: Upload unpacked extension
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: kapter-extension/dist
          retention-days: 7
