name: Extension CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: Lint, typecheck, and build extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "latest"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build shared contracts
        run: pnpm --filter @kapter/contracts build

      - name: Lint extension
        run: pnpm --filter ./kapter-extension lint

      - name: Typecheck extension
        run: pnpm --filter ./kapter-extension typecheck

      - name: Build extension
        run: pnpm --filter ./kapter-extension build

      - name: Upload unpacked extension
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: kapter-extension/dist
          retention-days: 7
