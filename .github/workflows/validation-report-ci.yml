name: Validation Report CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-report:
    name: Generate validation report
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_ci
      NOTION_API_KEY: ci-placeholder
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kapter_test?schema=public
      AI_WORKER_BASE_URL: http://127.0.0.1:8000
      KAPTER_AI_USE_REAL_MODELS: "false"
      KAPTER_AI_DEVICE: cpu
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kapter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kapter_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "latest"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kapter-ai-worker/requirements-ci.txt

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Install worker CI dependencies
        run: python -m pip install -r requirements-ci.txt
        working-directory: kapter-ai-worker

      - name: Generate validation report
        id: generate-report
        continue-on-error: true
        run: pnpm test:report:ci

      - name: Upload validation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/tests
          retention-days: 7

      - name: Fail when report generation detects validation failures
        if: steps.generate-report.outcome != 'success'
        run: exit 1
