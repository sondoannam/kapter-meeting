name: AI Worker CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-worker:
    name: Test AI worker
    runs-on: ubuntu-latest
    env:
      KAPTER_AI_USE_REAL_MODELS: "false"
      KAPTER_AI_DEVICE: cpu
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kapter-ai-worker/requirements-ci.txt

      - name: Install worker CI dependencies
        run: python -m pip install -r requirements-ci.txt
        working-directory: kapter-ai-worker

      # - name: Run worker tests
      #   run: python -m pytest tests -q
      #   working-directory: kapter-ai-worker
