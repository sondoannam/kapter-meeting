name: Webapp CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webapp:
    name: Lint, typecheck, and build webapp
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "latest"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build shared contracts
        run: pnpm --filter @kapter/contracts build

      - name: Lint webapp
        run: pnpm --filter ./kapter-webapp lint

      - name: Typecheck webapp
        run: pnpm --filter ./kapter-webapp typecheck

      - name: Build webapp
        run: pnpm --filter ./kapter-webapp build

      - name: Upload webapp build
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: kapter-webapp/dist
          retention-days: 7
