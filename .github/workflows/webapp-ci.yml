name: Webapp CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webapp:
    name: Lint, typecheck, and build webapp
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @kapter/contracts build

      - name: Lint webapp
        run: pnpm --filter ./kapter-webapp lint

      - name: Typecheck webapp
        run: pnpm --filter ./kapter-webapp typecheck

      - name: Build webapp
        run: pnpm --filter ./kapter-webapp build

      - name: Upload webapp build
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: kapter-webapp/dist
          retention-days: 7
