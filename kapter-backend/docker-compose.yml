services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    restart: "no"
    command: ["pnpm", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env:ro

  kapter-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - sondn_net
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  sondn_net:
    external: true
